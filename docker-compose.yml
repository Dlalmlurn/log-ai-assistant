services:
  kafka:
    image: ${KAFKA_IMAGE:-apache/kafka:3.7.0}
    container_name: kafka
    ports:
      - "${KAFKA_HOST_PORT:-9092}:29092"
      - "${KAFKA_CONTROLLER_HOST_PORT:-9093}:9093"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,PLAINTEXT_HOST://0.0.0.0:29092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:${KAFKA_HOST_PORT:-9092}
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LOG_DIRS: /var/lib/kafka/data
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
      KAFKA_NUM_PARTITIONS: ${KAFKA_TOPIC_PARTITIONS:-3}
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
    volumes:
      - kafka_data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list > /dev/null 2>&1"]
      interval: 15s
      timeout: 10s
      retries: 10

  kafka-init:
    image: ${KAFKA_IMAGE:-apache/kafka:3.7.0}
    container_name: kafka-init
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      KAFKA_RAW_TOPIC: ${KAFKA_RAW_TOPIC:-raw_logs}
      KAFKA_PARSED_TOPIC: ${KAFKA_PARSED_TOPIC:-parsed_logs}
      KAFKA_ALERT_TOPIC: ${KAFKA_ALERT_TOPIC:-alert_events}
      KAFKA_AI_TOPIC: ${KAFKA_AI_TOPIC:-ai_reports}
      KAFKA_METRICS_TOPIC: ${KAFKA_METRICS_TOPIC:-system_metrics}
      KAFKA_TOPIC_PARTITIONS: ${KAFKA_TOPIC_PARTITIONS:-3}
      KAFKA_TOPIC_REPLICATION_FACTOR: 1
    volumes:
      - ./scripts/create_kafka_topics.sh:/opt/app/scripts/create_kafka_topics.sh:ro
    command: ["/bin/bash", "/opt/app/scripts/create_kafka_topics.sh"]

  clickhouse:
    image: ${CLICKHOUSE_IMAGE:-clickhouse/clickhouse-server:24.8}
    container_name: clickhouse
    ports:
      - "${CLICKHOUSE_HTTP_HOST_PORT:-8123}:8123"
      - "${CLICKHOUSE_NATIVE_HOST_PORT:-9000}:9000"
    environment:
      CLICKHOUSE_DB: ${CLICKHOUSE_DATABASE:-log_ai}
      CLICKHOUSE_USER: ${CLICKHOUSE_USER:-default}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD:-}
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1
    volumes:
      - clickhouse_data:/var/lib/clickhouse
      - ./sql/clickhouse:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "clickhouse-client --query 'SELECT 1' > /dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 12

  flink-jobmanager:
    image: ${FLINK_IMAGE:-flink:1.18.1}
    container_name: flink-jobmanager
    command: jobmanager
    ports:
      - "${FLINK_DASHBOARD_HOST_PORT:-8081}:8081"
    environment:
      FLINK_PROPERTIES: |
        jobmanager.rpc.address: flink-jobmanager
        jobmanager.memory.process.size: 1024m
        rest.bind-address: 0.0.0.0
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8081/overview > /dev/null"]
      interval: 15s
      timeout: 10s
      retries: 10

  flink-taskmanager:
    image: ${FLINK_IMAGE:-flink:1.18.1}
    container_name: flink-taskmanager
    command: taskmanager
    depends_on:
      flink-jobmanager:
        condition: service_healthy
    environment:
      FLINK_PROPERTIES: |
        jobmanager.rpc.address: flink-jobmanager
        taskmanager.numberOfTaskSlots: 4
        taskmanager.memory.process.size: 2048m

  filebeat:
    image: ${FILEBEAT_IMAGE:-docker.elastic.co/beats/filebeat:8.13.4}
    container_name: filebeat
    user: root
    command: ["--strict.perms=false"]
    volumes:
      - ./filebeat/filebeat.yml:/usr/share/filebeat/filebeat.yml:ro
      - ./logs:/var/log/app:ro
    depends_on:
      kafka-init:
        condition: service_completed_successfully
      log-generator:
        condition: service_started

  backend:
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
      args:
        PYTHON_BASE_IMAGE: ${PYTHON_BASE_IMAGE:-python:3.11-slim}
    container_name: log-ai-backend
    environment:
      KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS_DOCKER:-kafka:9092}
      KAFKA_RAW_TOPIC: ${KAFKA_RAW_TOPIC:-raw_logs}
      KAFKA_PARSED_TOPIC: ${KAFKA_PARSED_TOPIC:-parsed_logs}
      KAFKA_ALERT_TOPIC: ${KAFKA_ALERT_TOPIC:-alert_events}
      KAFKA_AI_TOPIC: ${KAFKA_AI_TOPIC:-ai_reports}
      KAFKA_METRICS_TOPIC: ${KAFKA_METRICS_TOPIC:-system_metrics}
      CLICKHOUSE_HOST: ${CLICKHOUSE_HOST:-clickhouse}
      CLICKHOUSE_HTTP_PORT: ${CLICKHOUSE_HTTP_PORT:-8123}
      CLICKHOUSE_NATIVE_PORT: ${CLICKHOUSE_NATIVE_PORT:-9000}
      CLICKHOUSE_DATABASE: ${CLICKHOUSE_DATABASE:-log_ai}
      CLICKHOUSE_USER: ${CLICKHOUSE_USER:-default}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD:-}
      FLINK_DASHBOARD_URL: ${FLINK_DASHBOARD_URL_DOCKER:-http://flink-jobmanager:8081}
      DASHSCOPE_API_KEY: ${DASHSCOPE_API_KEY_DOCKER:-}
      DASHSCOPE_MODEL: ${DASHSCOPE_MODEL:-qwen-plus}
      BACKEND_CORS_ORIGINS: ${BACKEND_CORS_ORIGINS:-http://localhost:5173}
    ports:
      - "${FASTAPI_HOST_PORT:-8000}:8000"
    volumes:
      - ./src:/app/src:ro
    depends_on:
      kafka-init:
        condition: service_completed_successfully
      clickhouse:
        condition: service_healthy
      flink-jobmanager:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/health', timeout=5)\""]
      interval: 15s
      timeout: 10s
      retries: 10

  frontend:
    build:
      context: .
      dockerfile: docker/frontend.Dockerfile
      args:
        NODE_BASE_IMAGE: ${NODE_BASE_IMAGE:-node:20-alpine}
    container_name: log-ai-frontend
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8000}
    ports:
      - "${FRONTEND_HOST_PORT:-5173}:5173"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://localhost:5173').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))\""]
      interval: 15s
      timeout: 10s
      retries: 10

  log-generator:
    build:
      context: .
      dockerfile: docker/log-generator.Dockerfile
      args:
        PYTHON_BASE_IMAGE: ${PYTHON_BASE_IMAGE:-python:3.11-slim}
    container_name: log-generator
    environment:
      LOG_GENERATOR_OUTPUT: ${LOG_GENERATOR_OUTPUT:-/var/log/app/vpn_logs.log}
      LOG_GENERATOR_INTERVAL_SECONDS: ${LOG_GENERATOR_INTERVAL_SECONDS:-5}
      LOG_GENERATOR_BATCH_SIZE: ${LOG_GENERATOR_BATCH_SIZE:-3}
      LOG_GENERATOR_SEED: ${LOG_GENERATOR_SEED:-42}
    volumes:
      - ./logs:/var/log/app

  log-generator-scale:
    build:
      context: .
      dockerfile: docker/log-generator.Dockerfile
      args:
        PYTHON_BASE_IMAGE: ${PYTHON_BASE_IMAGE:-python:3.11-slim}
    container_name: log-generator-scale
    profiles: ["scale"]
    environment:
      LOG_GENERATOR_OUTPUT: ${LOG_GENERATOR_OUTPUT:-/var/log/app/vpn_logs.log}
      LOG_GENERATOR_INTERVAL_SECONDS: ${LOG_GENERATOR_SCALE_INTERVAL_SECONDS:-1}
      LOG_GENERATOR_BATCH_SIZE: ${LOG_GENERATOR_SCALE_BATCH_SIZE:-50}
      LOG_GENERATOR_SEED: ${LOG_GENERATOR_SCALE_SEED:-4242}
    volumes:
      - ./logs:/var/log/app

  flink-submit:
    image: ${FLINK_IMAGE:-flink:1.18.1}
    container_name: flink-submit
    profiles: ["jobs"]
    working_dir: /opt/app
    environment:
      KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS_DOCKER:-kafka:9092}
      KAFKA_RAW_TOPIC: ${KAFKA_RAW_TOPIC:-raw_logs}
      KAFKA_PARSED_TOPIC: ${KAFKA_PARSED_TOPIC:-parsed_logs}
      PYTHONPATH: /opt/app
    volumes:
      - ./flink_jobs:/opt/app/flink_jobs:ro
      - ./src:/opt/app/src:ro
      - ./requirements:/opt/app/requirements:ro
    depends_on:
      kafka-init:
        condition: service_completed_successfully
      flink-jobmanager:
        condition: service_healthy
      flink-taskmanager:
        condition: service_started
    command:
      - bash
      - -lc
      - |
        flink run -m flink-jobmanager:8081 -py /opt/app/flink_jobs/raw_to_parsed.py \
          --bootstrap-servers "$$KAFKA_BOOTSTRAP_SERVERS" \
          --raw-topic "$$KAFKA_RAW_TOPIC" \
          --parsed-topic "$$KAFKA_PARSED_TOPIC"

  tester:
    build:
      context: .
      dockerfile: docker/tester.Dockerfile
      args:
        PYTHON_BASE_IMAGE: ${PYTHON_BASE_IMAGE:-python:3.11-slim}
    container_name: log-ai-tester
    profiles: ["test"]
    environment:
      KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS_DOCKER:-kafka:9092}
      CLICKHOUSE_HOST: ${CLICKHOUSE_HOST:-clickhouse}
      CLICKHOUSE_HTTP_PORT: ${CLICKHOUSE_HTTP_PORT:-8123}
      CLICKHOUSE_DATABASE: ${CLICKHOUSE_DATABASE:-log_ai}
      CLICKHOUSE_USER: ${CLICKHOUSE_USER:-default}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD:-}
      FLINK_DASHBOARD_URL: ${FLINK_DASHBOARD_URL_DOCKER:-http://flink-jobmanager:8081}
      DASHSCOPE_API_KEY: ${DASHSCOPE_API_KEY_DOCKER:-}
    volumes:
      - ./src:/app/src:ro
      - ./tests:/app/tests:ro
    command: ["pytest", "-q"]

  elasticsearch:
    image: ${ELASTICSEARCH_IMAGE:-docker.elastic.co/elasticsearch/elasticsearch:8.13.4}
    container_name: elasticsearch
    profiles: ["legacy-es"]
    ports:
      - "${ELASTICSEARCH_HOST_PORT:-9200}:9200"
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      xpack.security.http.ssl.enabled: "false"
      ES_JAVA_OPTS: "-Xms512m -Xmx512m"
    volumes:
      - es_data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health > /dev/null"]
      interval: 15s
      timeout: 10s
      retries: 10

  kibana:
    image: ${KIBANA_IMAGE:-docker.elastic.co/kibana/kibana:8.13.4}
    container_name: kibana
    profiles: ["legacy-es"]
    ports:
      - "${KIBANA_HOST_PORT:-5601}:5601"
    environment:
      ELASTICSEARCH_HOSTS: http://elasticsearch:9200
    depends_on:
      elasticsearch:
        condition: service_healthy

volumes:
  kafka_data:
  clickhouse_data:
  frontend_node_modules:
  es_data:
